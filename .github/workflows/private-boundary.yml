name: Private boundary

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  private-boundary:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted scanner
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: trusted
          persist-credentials: false
      - name: Check out candidate files without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false
      - name: Scan candidate with trusted rules
        env:
          PUBLIC_BOUNDARY_PRIVATE_TERMS: ${{ secrets.PUBLIC_BOUNDARY_PRIVATE_TERMS }}
        run: |
          test -n "$PUBLIC_BOUNDARY_PRIVATE_TERMS"
          python3 trusted/scripts/check_public_boundary.py candidate
