name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check public boundary
        run: python3 scripts/check_public_boundary.py .
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
